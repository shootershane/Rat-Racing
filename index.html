<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat Racing</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">

    <!-- Header -->
    <header id="topBar">
        <h1>🐀 RAT RACING</h1>
        <p class="subtitle">
            Pick 12 rats. Every racer has an equal chance to win!
        </p>
    </header>

    <!-- Rat Selection -->
    <section id="selectionScreen">

        <h2>Select Your Racers</h2>

        <div id="ratgrid">
            <!-- Filled by JavaScript -->
        </div>

        <div id="selectionInfo">
            <span id="selectedCount">0 / 12 Selected</span>

            <button id="startRace" disabled>
                Start Race
            </button>
        </div>

    </section>

    <!-- Race Screen -->
    <section id="raceScreen" class="hidden">

        <div id="broadcastBar">

            <div class="broadcastLeft">
                📺 RAT RACING LIVE
            </div>

            <div class="broadcastCenter">
                Race In Progress
            </div>

            <div class="broadcastRight">
                Leader:
                <span id="leaderName">---</span>
            </div>

        </div>

        <div id="trackArea">

            <!-- Generated by JavaScript -->

        </div>

        <div id="leaderboard">

            <h2>Leaderboard</h2>

            <ol id="leaderList">

            </ol>

        </div>

    </section>

    <!-- Winner Screen -->
    <section id="winnerScreen" class="hidden">

        <h2>🏆 WINNER 🏆</h2>

        <div id="winnerCard">

            <div id="winnerPortrait">
                🐀
            </div>

            <h1 id="winnerName">
                Cheddar
            </h1>

            <button id="raceAgain">
                Race Again
            </button>

        </div>

    </section>

</div>

<script src="game.js"></script>

</body>
</html>
