<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat Racing 2.0</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

    <!-- ================= HEADER ================= -->

    <header id="header">

        <h1>🐀 Rat Racing 2.0</h1>

        <p class="subtitle">
            Draft your racers. Watch the chaos.
        </p>

    </header>


    <!-- ============== HOME SCREEN ============== -->

    <section id="homeScreen" class="screen">

        <div class="panel">

            <h2>Project Status</h2>

            <div id="statusText">
                Waiting for JavaScript...
            </div>

            <button id="initializeButton">
                Initialize Project
            </button>

        </div>

    </section>


    <!-- ============== DRAFT SCREEN ============== -->

    <section id="draftScreen" class="screen hidden">

        <h2>Select Your 12 Rats</h2>

        <div id="ratGrid">

            <!-- game.js builds the rat cards -->

        </div>

        <div id="draftFooter">

            <span id="selectedCount">
                0 / 12 Selected
            </span>

            <button id="startRaceButton" disabled>
                Start Race
            </button>

        </div>

    </section>


    <!-- ============== RACE SCREEN ============== -->

    <section id="raceScreen" class="screen hidden">

        <div id="hud">

            <div class="hudCard">
                <label>Leader</label>
                <span id="leaderName">---</span>
            </div>

            <div class="hudCard">
                <label>Race Time</label>
                <span id="raceClock">00.0</span>
            </div>

            <div class="hudCard">
                <label>Distance</label>
                <span id="distanceRemaining">100%</span>
            </div>

        </div>

        <div id="trackContainer">

            <!-- game.js builds all 12 lanes -->

        </div>

        <aside id="sidebar">

            <div class="panel">

                <h3>Leaderboard</h3>

                <ol id="leaderboard">

                </ol>

            </div>

            <div class="panel">

                <h3>Commentary</h3>

                <div id="commentaryLog">

                </div>

            </div>

        </aside>

    </section>


    <!-- ============== RESULTS ============== -->

    <section id="resultsScreen" class="screen hidden">

        <h2>Race Results</h2>

        <div id="winnerBanner">

        </div>

        <table id="resultsTable">

            <thead>

                <tr>

                    <th>Place</th>
                    <th>Rat</th>
                    <th>Time</th>
                    <th>Behind</th>

                </tr>

            </thead>

            <tbody id="resultsBody">

            </tbody>

        </table>

        <div class="resultsButtons">

            <button id="raceAgainButton">
                Race Again
            </button>

            <button id="newDraftButton">
                New Draft
            </button>

        </div>

    </section>

</div>

<script src="game.js"></script>

</body>
</html>
